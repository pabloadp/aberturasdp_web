
backend:
  name: github
  repo: pabloadp/aberturasdp_web
  branch: main
  base_url: https://aberturasdp.com.ar
  auth_endpoint: /admin/

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'es'

collections:
  - name: "configuracion"
    label: "Configuracion"
    editor:
      preview: false
    files:
      - file: "site-config.json"
        label: "Datos del Negocio"
        name: "datos-negocio"
        fields:
          - { label: "Nombre", name: "nombre", widget: "string" }
          - { label: "Telefono", name: "telefono", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Direccion", name: "direccion", widget: "string" }
          - { label: "Horario", name: "horario", widget: "text" }
          - { label: "Instagram", name: "instagram", widget: "string" }
          - { label: "Facebook", name: "facebook", widget: "string", required: false }

  - name: "hero"
    label: "Seccion Inicio"
    editor:
      preview: false
    files:
      - file: "content/hero.json"
        label: "Contenido del Hero"
        name: "hero-content"
        fields:
          - { label: "Titulo Principal", name: "titulo", widget: "string" }
          - { label: "Texto Destacado", name: "titulo_destacado", widget: "string" }
          - { label: "Descripcion", name: "descripcion", widget: "text" }
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "Boton Principal", name: "boton_principal", widget: "string" }
          - { label: "Boton Secundario", name: "boton_secundario", widget: "string" }
          - { label: "Imagen", name: "imagen", widget: "image" }

  - name: "aberturas"
    label: "Aberturas"
    editor:
      preview: false
    files:
      - file: "content/aberturas.json"
        label: "Contenido Aberturas"
        name: "aberturas-content"
        fields:
          - { label: "Titulo", name: "titulo", widget: "string" }
          - { label: "Subtitulo", name: "subtitulo", widget: "text" }

  - name: "viviendas"
    label: "Viviendas Modulares"
    editor:
      preview: false
    files:
      - file: "content/viviendas.json"
        label: "Contenido Viviendas"
        name: "viviendas-content"
        fields:
          - { label: "Titulo", name: "titulo", widget: "string" }
          - { label: "Texto Destacado", name: "titulo_destacado", widget: "string" }
          - { label: "Descripcion", name: "descripcion", widget: "text" }
          - { label: "Imagen", name: "imagen", widget: "image" }

  - name: "galeria"
    label: "Galeria"
    folder: "content/galeria"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Descripcion", name: "descripcion", widget: "string", required: false }
      - { label: "Imagen", name: "imagen", widget: "image", required: true }

editor:
  preview: false

slug:
  encoding: "unicode"
  clean_accents: false
