<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Aberturas DP</title>
    <!--
    ================================================================
    NETLIFY CMS - PANEL DE ADMINISTRACIÓN
    ================================================================
    
    INSTRUCCIONES DE CONFIGURACIÓN:
    
    1. ACTIVAR IDENTITY EN NETLIFY:
       - Ir a tu sitio en Netlify → Settings → Identity
       - Click en "Enable Identity"
       - En "Registration preferences" seleccionar "Invite only"
       - En "External providers" puedes habilitar Google/GitHub
    
    2. AÑADIR USUARIOS:
       - En Identity → Users → Invite users
       - Ingresar email y enviar invitación
    
    3. CONFIGURAR GIT GATEWAY:
       - En Settings → Identity → Services → Git Gateway
       - Click en "Enable Git Gateway"
       - Esto permite guardar cambios en tu repositorio
    
    4. ACCEDER AL PANEL:
       - Ir a: https://tusitio.netlify.app/admin/
       - Login con email/contraseña o proveedores externos
    
    NOTA: La primera vez que accedas, recibirás un email
    para verificar tu cuenta.
    ================================================================
    -->
    
    <!-- Script de Netlify CMS -->
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
    
    <!-- Script de Netlify Identity (requerido para autenticación) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        /* Estilos personalizados para el login */
        .nc-githubAuthenticationPage-root {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        
        .nc-githubAuthenticationPage-logo {
            display: none;
        }
        
        /* Logo personalizado */
        .custom-logo {
            text-align: center;
            padding: 2rem;
            background: #f3f4f6;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .custom-logo h1 {
            margin: 0;
            color: #1f2937;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        
        .custom-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2563eb, #9ca3af);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Logo personalizado -->
    <div class="custom-logo">
        <h1>
            <div class="custom-logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>
            Aberturas DP - Panel de Administración
        </h1>
    </div>

    <!-- 
    Netlify CMS se inicializa automáticamente desde el script.
    La configuración está en config.yml
    -->
    
    <script>
        // Inicializar Netlify Identity
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
        
        // Configuración personalizada de Netlify CMS
        CMS.init({
            config: {
                load_config_file: true,
                config_file: 'config.yml'
            }
        });
    </script>
</body>
</html>
