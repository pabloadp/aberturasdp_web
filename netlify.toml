# ================================================================
# NETLIFY CONFIGURATION FILE
# ================================================================
# Este archivo configura el comportamiento de tu sitio en Netlify.
# 
# DOCUMENTACIÓN: https://docs.netlify.com/configure-builds/file-based-configuration/
# ================================================================

[build]
  # Directorio de publicación (donde están los archivos estáticos)
  publish = "."
  
  # Comando de build (vacío porque es sitio estático)
  command = ""

[build.environment]
  # Variables de entorno (opcional)
  NODE_VERSION = "18"

# ================================================================
# REDIRECTS Y REWRITES
# ================================================================
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# SPA fallback (si usas React Router en el futuro)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# ================================================================
# HEADERS DE SEGURIDAD
# ================================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Prevenir que el navegador "adivine" el tipo de contenido
    X-Content-Type-Options = "nosniff"
    
    # Protección contra clickjacking
    X-Frame-Options = "DENY"
    
    # Habilitar protección XSS del navegador
    X-XSS-Protection = "1; mode=block"
    
    # Política de referencias
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Content Security Policy (ajustar según necesidades)
    # Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://identity.netlify.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://api.netlify.com; frame-src https://identity.netlify.com;"

# Headers para archivos estáticos (caché)
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# ================================================================
# CONFIGURACIÓN DE FORMS (si usas Netlify Forms)
# ================================================================
# Los forms se detectan automáticamente si tienen data-netlify="true"
# Puedes configurar notificaciones en el panel de Netlify:
# Site settings → Forms → Form notifications

# ================================================================
# IDENTITY (Autenticación)
# ================================================================
# Configurar en el panel de Netlify:
# Site settings → Identity → Enable Identity
# Site settings → Identity → Services → Git Gateway

# ================================================================
# FUNCTIONS (si necesitas backend serverless)
# ================================================================
# [functions]
#   directory = "netlify/functions"
