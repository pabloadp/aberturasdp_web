# ================================================================
# NETLIFY CMS CONFIGURATION
# ================================================================
# Este archivo configura el panel de administración de Netlify CMS
# Permite editar el contenido del sitio sin tocar código
# ================================================================

backend:
  name: git-gateway
  branch: main  # Cambiar si usas otra rama (master, etc.)
  
# Configuración de publicación
publish_mode: editorial_workflow

# URL del sitio (se usa para previews)
site_url: https://aberturasdp.netlify.app  # CAMBIAR: por tu URL de Netlify

# Logo del panel de admin
display_url: https://aberturasdp.netlify.app  # CAMBIAR: por tu URL
logo_url: https://aberturasdp.netlify.app/logo.png  # CAMBIAR: por tu logo

# Idioma del panel
locale: 'es'

# Colecciones editables
# Cada colección representa un tipo de contenido que se puede editar
collections:

  # ================================================================
  # CONFIGURACIÓN GENERAL DEL SITIO
  # ================================================================
  - name: "configuracion"
    label: "⚙️ Configuración General"
    editor:
      preview: false
    files:
      - file: "site-config.json"
        label: "Datos del Negocio"
        name: "datos-negocio"
        fields:
          - label: "Nombre del Negocio"
            name: "nombre"
            widget: "string"
            default: "Aberturas DP"
          
          - label: "Teléfono / WhatsApp"
            name: "telefono"
            widget: "string"
            default: "+54 9 11 6988-4066"
          
          - label: "Email"
            name: "email"
            widget: "string"
            default: "contacto@aberturasdp.com"
          
          - label: "Dirección"
            name: "direccion"
            widget: "string"
            default: "San Vicente, provincia de Buenos Aires, Argentina"
          
          - label: "Horario de Atención"
            name: "horario"
            widget: "text"
            default: "Lunes a Viernes: 8:00 - 17:00\nSábados: 8:00 - 12:00"
          
          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            default: "https://instagram.com/aberturadp"
          
          - label: "Facebook URL"
            name: "facebook"
            widget: "string"
            default: ""
            required: false

  # ================================================================
  # SECCIÓN HERO (INICIO)
  # ================================================================
  - name: "hero"
    label: "🏠 Sección Inicio"
    editor:
      preview: false
    files:
      - file: "content/hero.json"
        label: "Contenido del Hero"
        name: "hero-content"
        fields:
          - label: "Título Principal"
            name: "titulo"
            widget: "string"
            default: "Calidad y diseño en cada abertura"
          
          - label: "Texto Destacado (en azul)"
            name: "titulo_destacado"
            widget: "string"
            default: "abertura"
          
          - label: "Descripción"
            name: "descripcion"
            widget: "text"
            default: "En Aberturas DP nos especializamos en la fabricación de aberturas de aluminio y PVC de alta calidad, y en la construcción de viviendas modulares a partir de contenedores marítimos."
          
          - label: "Texto del Badge"
            name: "badge"
            widget: "string"
            default: "Más de 10 años de experiencia"
          
          - label: "Texto Botón Principal"
            name: "boton_principal"
            widget: "string"
            default: "Solicitar presupuesto"
          
          - label: "Texto Botón Secundario"
            name: "boton_secundario"
            widget: "string"
            default: "Conocer más"
          
          - label: "Imagen del Hero"
            name: "imagen"
            widget: "image"
            default: "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800&h=600&fit=crop"
            media_library:
              config:
                multiple: false
          
          - label: "Estadísticas"
            name: "estadisticas"
            widget: "list"
            fields:
              - label: "Número"
                name: "numero"
                widget: "string"
              - label: "Etiqueta"
                name: "etiqueta"
                widget: "string"
            default:
              - { numero: "500+", etiqueta: "Proyectos" }
              - { numero: "10+", etiqueta: "Años" }
              - { numero: "100%", etiqueta: "Satisfacción" }

  # ================================================================
  # SECCIÓN ABERTURAS
  # ================================================================
  - name: "aberturas"
    label: "🪟 Aberturas"
    editor:
      preview: false
    files:
      - file: "content/aberturas.json"
        label: "Contenido Aberturas"
        name: "aberturas-content"
        fields:
          - label: "Título de la Sección"
            name: "titulo"
            widget: "string"
            default: "Nuestras Aberturas"
          
          - label: "Subtítulo"
            name: "subtitulo"
            widget: "text"
            default: "Ofrecemos soluciones en aberturas de alta calidad, adaptadas a las necesidades de cada proyecto."
          
          - label: "Aluminio"
            name: "aluminio"
            widget: "object"
            fields:
              - label: "Título"
                name: "titulo"
                widget: "string"
                default: "Aberturas de Aluminio"
              
              - label: "Descripción"
                name: "descripcion"
                widget: "text"
                default: "Las aberturas de aluminio son la opción más popular por su durabilidad, resistencia y bajo mantenimiento."
              
              - label: "Imagen"
                name: "imagen"
                widget: "image"
                default: "https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=600&h=400&fit=crop"
              
              - label: "Características"
                name: "caracteristicas"
                widget: "list"
                field: { label: "Característica", name: "item", widget: "string" }
                default:
                  - "Alta resistencia a la corrosión"
                  - "Diseño moderno y elegante"
                  - "Bajo mantenimiento"
                  - "Excelente aislación térmica y acústica"
                  - "Variedad de colores y terminaciones"
          
          - label: "PVC"
            name: "pvc"
            widget: "object"
            fields:
              - label: "Título"
                name: "titulo"
                widget: "string"
                default: "Aberturas de PVC"
              
              - label: "Descripción"
                name: "descripcion"
                widget: "text"
                default: "El PVC ofrece la mejor aislación térmica y acústica del mercado. Perfecto para eficiencia energética."
              
              - label: "Imagen"
                name: "imagen"
                widget: "image"
                default: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&h=400&fit=crop"
              
              - label: "Características"
                name: "caracteristicas"
                widget: "list"
                field: { label: "Característica", name: "item", widget: "string" }
                default:
                  - "Máxima aislación térmica"
                  - "Excelente aislación acústica"
                  - "Resistente a la humedad"
                  - "No requiere mantenimiento"
                  - "Eficiencia energética garantizada"

  # ================================================================
  # SECCIÓN VIVIENDAS MODULARES
  # ================================================================
  - name: "viviendas"
    label: "🏗️ Viviendas Modulares"
    editor:
      preview: false
    files:
      - file: "content/viviendas.json"
        label: "Contenido Viviendas"
        name: "viviendas-content"
        fields:
          - label: "Título"
            name: "titulo"
            widget: "string"
            default: "Viviendas Modulares"
          
          - label: "Texto Destacado"
            name: "titulo_destacado"
            widget: "string"
            default: "Modulares"
          
          - label: "Descripción"
            name: "descripcion"
            widget: "text"
            default: "Nuestras viviendas modulares están construidas a partir de contenedores marítimos reciclados, ofreciendo una solución habitacional innovadora, sostenible y económica."
          
          - label: "Imagen Principal"
            name: "imagen"
            widget: "image"
            default: "https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=800&h=600&fit=crop"
          
          - label: "Texto del Badge"
            name: "badge"
            widget: "string"
            default: "Novedad"
          
          - label: "Beneficios"
            name: "beneficios"
            widget: "list"
            fields:
              - label: "Icono (clase Font Awesome)"
                name: "icono"
                widget: "string"
                default: "fas fa-bolt"
              - label: "Título"
                name: "titulo"
                widget: "string"
              - label: "Descripción"
                name: "descripcion"
                widget: "string"
            default:
              - { icono: "fas fa-bolt", titulo: "Rápida construcción", descripcion: "Entrega en semanas, no en meses" }
              - { icono: "fas fa-leaf", titulo: "Ecológica", descripcion: "Reutilización de contenedores" }
              - { icono: "fas fa-dollar-sign", titulo: "Económica", descripcion: "Menor costo que construcción tradicional" }
              - { icono: "fas fa-shield-alt", titulo: "Resistente", descripcion: "Estructura de acero sólida" }
              - { icono: "fas fa-paint-roller", titulo: "Personalizable", descripcion: "Diseño a tu medida" }
              - { icono: "fas fa-truck", titulo: "Transportable", descripcion: "Mudate con tu casa" }
          
          - label: "Texto del Botón"
            name: "boton_texto"
            widget: "string"
            default: "Consultar presupuesto"

  # ================================================================
  # GALERÍA DE TRABAJOS
  # ================================================================
  - name: "galeria"
    label: "📷 Galería"
    folder: "content/galeria"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: "Título del Trabajo"
        name: "title"
        widget: "string"
      
      - label: "Descripción / Ubicación"
        name: "descripcion"
        widget: "string"
        required: false
      
      - label: "Imagen"
        name: "imagen"
        widget: "image"
        required: true
      
      - label: "Categoría"
        name: "categoria"
        widget: "select"
        options:
          - { label: "Aluminio", value: "aluminio" }
          - { label: "PVC", value: "pvc" }
          - { label: "Vivienda Modular", value: "vivienda" }
          - { label: "Otro", value: "otro" }
        default: "aluminio"
      
      - label: "Orden de visualización"
        name: "orden"
        widget: "number"
        default: 0
        value_type: "int"
        min: 0
        max: 100

  # ================================================================
  # PÁGINAS ESTÁTICAS
  # ================================================================
  - name: "paginas"
    label: "📄 Páginas"
    editor:
      preview: false
    files:
      - file: "content/contacto.json"
        label: "Información de Contacto"
        name: "contacto-info"
        fields:
          - label: "Título de la Sección"
            name: "titulo"
            widget: "string"
            default: "Contactanos"
          
          - label: "Subtítulo"
            name: "subtitulo"
            widget: "text"
            default: "Estamos listos para ayudarte con tu proyecto. Escribinos y te responderemos a la brevedad."
          
          - label: "Título del Formulario"
            name: "formulario_titulo"
            widget: "string"
            default: "Solicitá un presupuesto"
          
          - label: "Subtítulo del Formulario"
            name: "formulario_subtitulo"
            widget: "string"
            default: "Completá el formulario y te contactaremos a la brevedad."

  # ================================================================
  # SEO Y METADATOS
  # ================================================================
  - name: "seo"
    label: "🔍 SEO y Metadatos"
    editor:
      preview: false
    files:
      - file: "content/seo.json"
        label: "Configuración SEO"
        name: "seo-config"
        fields:
          - label: "Título del Sitio"
            name: "titulo_sitio"
            widget: "string"
            default: "Aberturas DP | Aberturas de Aluminio y PVC - Viviendas Modulares"
          
          - label: "Descripción Meta"
            name: "descripcion_meta"
            widget: "text"
            default: "Aberturas DP - Fabricación de aberturas de aluminio y PVC, y viviendas modulares construidas con contenedores marítimos en San Vicente, Buenos Aires."
          
          - label: "Palabras Clave"
            name: "keywords"
            widget: "list"
            field: { label: "Keyword", name: "keyword", widget: "string" }
            default:
              - "aberturas"
              - "aluminio"
              - "PVC"
              - "viviendas modulares"
              - "contenedores"
              - "San Vicente"
              - "Buenos Aires"
          
          - label: "Imagen para Redes Sociales (OG Image)"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Imagen que aparece al compartir en redes sociales (1200x630px recomendado)"

# ================================================================
# CONFIGURACIÓN DE EDITOR
# ================================================================
editor:
  preview: false

# ================================================================
# SLUGS (URLs amigables)
# ================================================================
slug:
  encoding: "unicode"
  clean_accents: false
