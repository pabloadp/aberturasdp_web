# ================================================================
# NETLIFY CMS CONFIGURATION
# ================================================================
# Este archivo configura el panel de administración de Netlify CMS
# Permite editar el contenido del sitio sin tocar código
# ================================================================

backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'es'

collections:
  - name: "configuracion"
    label: "Configuración General"
    editor:
      preview: false
    files:
      - file: "site-config.json"
        label: "Datos del Negocio"
        name: "datos-negocio"
        fields:
          - { label: "Nombre del Negocio", name: "nombre", widget: "string", default: "Aberturas DP" }
          - { label: "Teléfono / WhatsApp", name: "telefono", widget: "string", default: "+54 9 11 6988-4066" }
          - { label: "Email", name: "email", widget: "string", default: "contacto@aberturasdp.com" }
          - { label: "Dirección", name: "direccion", widget: "string", default: "San Vicente, provincia de Buenos Aires, Argentina" }
          - { label: "Horario de Atención", name: "horario", widget: "text", default: "Lunes a Viernes: 8:00 - 17:00\nSábados: 8:00 - 12:00" }
          - { label: "Instagram URL", name: "instagram", widget: "string", default: "https://instagram.com/aberturadp" }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }

  - name: "hero"
    label: "Sección Inicio"
    editor:
      preview: false
    files:
      - file: "content/hero.json"
        label: "Contenido del Hero"
        name: "hero-content"
        fields:
          - { label: "Título Principal", name: "titulo", widget: "string", default: "Calidad y diseño en cada" }
          - { label: "Texto Destacado (en azul)", name: "titulo_destacado", widget: "string", default: "abertura" }
          - { label: "Descripción", name: "descripcion", widget: "text" }
          - { label: "Texto del Badge", name: "badge", widget: "string", default: "Más de 10 años de experiencia" }
          - { label: "Texto Botón Principal", name: "boton_principal", widget: "string", default: "Solicitar presupuesto" }
          - { label: "Texto Botón Secundario", name: "boton_secundario", widget: "string", default: "Conocer más" }
          - { label: "Imagen del Hero", name: "imagen", widget: "image" }
          - label: "Estadísticas"
            name: "estadisticas"
            widget: "list"
            fields:
              - { label: "Número", name: "numero", widget: "string" }
              - { label: "Etiqueta", name: "etiqueta", widget: "string" }

  - name: "aberturas"
    label: "Aberturas"
    editor:
      preview: false
    files:
      - file: "content/aberturas.json"
        label: "Contenido Aberturas"
        name: "aberturas-content"
        fields:
          - { label: "Título de la Sección", name: "titulo", widget: "string", default: "Nuestras Aberturas" }
          - { label: "Subtítulo", name: "subtitulo", widget: "text" }
          - label: "Aluminio"
            name: "aluminio"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string", default: "Aberturas de Aluminio" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Características", name: "caracteristicas", widget: "list", field: { label: "Característica", name: "item", widget: "string" } }
          - label: "PVC"
            name: "pvc"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string", default: "Aberturas de PVC" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Características", name: "caracteristicas", widget: "list", field: { label: "Característica", name: "item", widget: "string" } }

  - name: "viviendas"
    label: "Viviendas Modulares"
    editor:
      preview: false
    files:
      - file: "content/viviendas.json"
        label: "Contenido Viviendas"
        name: "viviendas-content"
        fields:
          - { label: "Título", name: "titulo", widget: "string", default: "Viviendas" }
          - { label: "Texto Destacado", name: "titulo_destacado", widget: "string", default: "Modulares" }
          - { label: "Descripción", name: "descripcion", widget: "text" }
          - { label: "Imagen Principal", name: "imagen", widget: "image" }
          - { label: "Texto del Badge", name: "badge", widget: "string", default: "Novedad" }
          - label: "Beneficios"
            name: "beneficios"
            widget: "list"
            fields:
              - { label: "Icono (clase Font Awesome)", name: "icono", widget: "string", default: "fas fa-bolt" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "string" }
          - { label: "Texto del Botón", name: "boton_texto", widget: "string", default: "Consultar presupuesto" }

  - name: "galeria"
    label: "Galería"
    folder: "content/galeria"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Título del Trabajo", name: "title", widget: "string" }
      - { label: "Descripción / Ubicación", name: "descripcion", widget: "string", required: false }
      - { label: "Imagen", name: "imagen", widget: "image", required: true }
      - label: "Categoría"
        name: "categoria"
        widget: "select"
        options:
          - { label: "Aluminio", value: "aluminio" }
          - { label: "PVC", value: "pvc" }
          - { label: "Vivienda Modular", value: "vivienda" }
          - { label: "Otro", value: "otro" }
        default: "aluminio"
      - { label: "Orden de visualización", name: "orden", widget: "number", default: 0, value_type: "int", min: 0, max: 100 }

  - name: "paginas"
    label: "Páginas"
    editor:
      preview: false
    files:
      - file: "content/contacto.json"
        label: "Información de Contacto"
        name: "contacto-info"
        fields:
          - { label: "Título de la Sección", name: "titulo", widget: "string", default: "Contactanos" }
          - { label: "Subtítulo", name: "subtitulo", widget: "text" }
          - { label: "Título del Formulario", name: "formulario_titulo", widget: "string", default: "Solicitá un presupuesto" }
          - { label: "Subtítulo del Formulario", name: "formulario_subtitulo", widget: "string", default: "Completá el formulario y te contactaremos a la brevedad." }

  - name: "seo"
    label: "SEO y Metadatos"
    editor:
      preview: false
    files:
      - file: "content/seo.json"
        label: "Configuración SEO"
        name: "seo-config"
        fields:
          - { label: "Título del Sitio", name: "titulo_sitio", widget: "string", default: "Aberturas DP | Aberturas de Aluminio y PVC - Viviendas Modulares" }
          - { label: "Descripción Meta", name: "descripcion_meta", widget: "text" }
          - { label: "Palabras Clave", name: "keywords", widget: "list", field: { label: "Keyword", name: "keyword", widget: "string" } }
          - { label: "Imagen para Redes Sociales (OG Image)", name: "og_image", widget: "image", required: false }

editor:
  preview: false

slug:
  encoding: "unicode"
  clean_accents: false
